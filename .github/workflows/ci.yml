name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build debug app
        run: swift build

      - name: Run tests
        run: swift test

      - name: Build packaged app bundle
        run: ./scripts/build-app.sh
